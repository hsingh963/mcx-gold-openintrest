<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCX Gold Option Chain</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="header">
        <h1>MCX Gold Option Chain</h1>
        <p>Load the current option-chain graph for a selected expiry.</p>
      </div>

      <div class="controls">
        <label for="commodityDropdown">Commodity</label>
        <select id="commodityDropdown">
          <option value="GOLD">GOLD</option>
          <option value="GOLDM">GOLDM</option>
        </select>

        <label for="expiryDropdown">Expiry</label>
        <select id="expiryDropdown"></select>

        <div class="actions">
          <button id="loadBtn" type="button">Load Data</button>
          <button id="refreshBtn" type="button" class="secondary">Refresh</button>
        </div>
      </div>

      <div id="status" class="status">Loading expiries...</div>

      <div class="cards">
        <div class="card" id="pcrCard"></div>
        <div class="card" id="oiCard"></div>
        <div class="card" id="sentimentCard"></div>
      </div>

      <div class="chart-wrap">
        <canvas id="oiChart"></canvas>
      </div>

      <div id="pcrContainer">
        <h3>PCR Meter</h3>
        <div id="pcrValue"></div>
        <div id="pcrBar">
          <div id="pcrFill"></div>
        </div>
        <div id="pcrLabel"></div>
      </div>

      <div id="explanationBox"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
