<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCX Trading Terminal</title>
  <script src="/lib/chartjs/chart.umd.js"></script>
  <script src="/lib/chartjs/chartjs-plugin-annotation.min.js"></script>
  <script src="/lib/chartjs/chartjs-plugin-datalabels.min.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="terminal-shell">
    <div class="container">
      <h1>MCX Trading Terminal</h1>

      <div class="top-bar">
        <div class="controls">
          <button id="compareToggle" type="button">🔀 Compare Mode</button>

          <select id="commodityDropdown">
            <option value="GOLD">GOLD</option>
            <option value="GOLDM">GOLD MINI</option>
          </select>

          <select id="expiryDropdown"></select>

          <select id="rangeSelector">
            <option value="all">All</option>
            <option value="5">±5 strikes</option>
            <option value="10" selected>±10 strikes</option>
            <option value="20">±20 strikes</option>
          </select>

          <button id="loadBtn" type="button">🚀 Load Data</button>
          <button id="refreshBtn" type="button">🔄 Refresh</button>
        </div>

        <div id="ltpBox" class="ltp-box">₹ --</div>
      </div>

      <div id="singleView">
        <div class="cards">
          <div class="card" id="pcrCard"></div>
          <div class="card" id="oiCard"></div>
          <div class="card" id="sentimentCard"></div>
        </div>

        <div id="explanationBox" class="explanation"></div>

        <div class="chart-container">
          <h3>📊 Option Chain OI</h3>
          <canvas id="oiChart"></canvas>
        </div>
      </div>

      <div id="compareView" class="hidden">
        <div class="compare-container">
          <div class="panel" id="goldPanel">
            <h3>🟡 GOLD</h3>
            <div class="panel-controls">
              <select id="goldExpiry"></select>
              <button id="goldLoadBtn" type="button">🚀 Load Data</button>
            </div>
            <div class="cards panel-cards">
              <div class="card" id="goldPcrCard"></div>
              <div class="card" id="goldOiCard"></div>
              <div class="card" id="goldSentimentCard"></div>
            </div>
            <div id="goldExplanationBox" class="explanation"></div>
            <div class="chart-container panel-chart">
              <canvas id="goldChart"></canvas>
            </div>
          </div>

          <div class="panel" id="goldmPanel">
            <h3>⚪ GOLD MINI</h3>
            <div class="panel-controls">
              <select id="goldmExpiry"></select>
              <button id="goldmLoadBtn" type="button">🚀 Load Data</button>
            </div>
            <div class="cards panel-cards">
              <div class="card" id="goldmPcrCard"></div>
              <div class="card" id="goldmOiCard"></div>
              <div class="card" id="goldmSentimentCard"></div>
            </div>
            <div id="goldmExplanationBox" class="explanation"></div>
            <div class="chart-container panel-chart">
              <canvas id="goldmChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
